services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/crm
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mon_super_secret_crm_2026
      - SMTP_HOST=smtp-relay.brevo.com
      - SMTP_PORT=587
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=https://m-atici.fr
    ports:
      - "5173:5173"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
      - goaccess_data:/usr/share/caddy/stats
    depends_on:
      - frontend
      - backend

  goaccess:
    image: allinurl/goaccess
    restart: unless-stopped
    environment:
      - LANG=fr_FR.UTF-8
      - LC_ALL=fr_FR.UTF-8
    volumes:
      - caddy_logs:/srv/logs:ro
      - goaccess_data:/srv/report
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do goaccess /srv/logs/access.log -o /srv/report/index.html --log-format=CADDY --no-global-config 2>/dev/null; sleep 60; done"]
    depends_on:
      - caddy

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  goaccess_data:
